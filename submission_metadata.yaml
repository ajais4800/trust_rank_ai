# Redrob Hackathon — Submission Metadata
#
# Filled in per challenge requirements.

# ============================================================================
# Team identity
# ============================================================================
team_name: "Team Antigravity"  # Used in leaderboard and announcements

primary_contact:
  name: "Ajai"
  email: "ajai@example.com"   # Used for all organizer communication
  phone: "+91-9999999999"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Ajai"
    email: "ajai@example.com"
    role: "ML Engineer"          # Optional, e.g. "Team Lead", "Backend", "Data"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/ajais4800/trust_rank_ai"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/ajais4800/trust_rank_ai"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./data/[PUB] India_runs_data_and_ai_challenge/India_runs_data_and_ai_challenge/candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local PC (Windows)"                # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.12.0"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Used Claude and Gemini for architectural design, code review, optimization, and debugging of the scoring engine.
  No candidate data was uploaded or fed to hosted LLM APIs during ranking.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  An alignment-focused rule-based scoring engine incorporating 6 dimensions: AI skills matching with confidence weighting, role-relevance matching, experience tier, work setting, location preferences, and redrob behavioral signals. The engine employs specialized checks to identify and penalize honeypot profiles and skill-stuffer anomalies. Fully implemented in Python and optimized for speed, executing at 4,000+ candidates/second on a CPU.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
